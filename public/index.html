<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Muyu Reader — 沐浴阅读器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" />
<link rel="stylesheet" href="SereneReader.css">
<style>
/* ═══════════════════════════════════════════
   Muyu Reader — Stitch Design System
   Warm, serene, paper-like reading experience
   ═══════════════════════════════════════════ */

:root {
  /* Colors */
  --color-background: #fbf9f4;
  --color-surface: #fbf9f4;
  --color-surface-container: #f0eee9;
  --color-surface-container-high: #eae8e3;
  --color-surface-container-low: #f5f3ee;
  --color-surface-container-lowest: #ffffff;
  --color-primary: #4a654e;
  --color-primary-container: #8ba88e;
  --color-primary-fixed: #cceace;
  --color-primary-fixed-dim: #b0ceb2;
  --color-on-primary: #ffffff;
  --color-on-primary-container: #233d29;
  --color-on-primary-fixed: #07200f;
  --color-on-primary-fixed-variant: #334d38;
  --color-secondary: #895036;
  --color-secondary-container: #fdb292;
  --color-secondary-fixed: #ffdbcd;
  --color-tertiary: #46636c;
  --color-tertiary-container: #88a6b0;
  --color-on-surface: #1b1c19;
  --color-on-surface-variant: #424842;
  --color-outline: #737972;
  --color-outline-variant: #c2c8c0;
  --color-error: #ba1a1a;
  --color-error-container: #ffdad6;

  /* Typography */
  --font-body: 'Noto Serif SC', 'Songti SC', serif;
  --font-ui: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;

  /* Spacing */
  --unit: 8px;
  --gutter: 16px;
  --margin-mobile: 28px;
  --margin-desktop: 64px;
  --container-max-width: 800px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-ui);
  background: var(--color-background);
  color: var(--color-on-surface);
  padding-bottom: 20px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.container {
  max-width: var(--container-max-width);
  margin: 0 auto;
  padding: 0 var(--margin-mobile);
}

@media (min-width: 800px) {
  .container { padding: 0 var(--margin-desktop); }
}

/* ── Header ──────────────────────────────── */

.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 18px 0 16px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--color-outline-variant);
}

.header h1 {
  font-family: var(--font-ui);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--color-on-surface);
}

.header .fish {
  font-size: 24px;
  line-height: 1;
}

/* ── Home Screen ─────────────────────────── */

.search-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  padding: 0 12px;
}

.search-bar input {
  flex: 1;
  padding: 12px 16px;
  border: 1.5px solid var(--color-outline-variant);
  border-radius: 12px;
  background: var(--color-surface-container-lowest);
  color: var(--color-on-surface);
  font-family: var(--font-ui);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.search-bar input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(74, 101, 78, 0.12);
}

.search-bar input::placeholder {
  color: var(--color-on-surface-variant);
  opacity: 0.6;
}

.search-bar button {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 20px;
  background: var(--color-primary);
  color: var(--color-on-primary);
  border: none;
  border-radius: 12px;
  font-family: var(--font-ui);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.1s ease;
}

.search-bar button:hover {
  background: var(--color-on-primary-fixed-variant);
}

.search-bar button:active {
  transform: scale(0.97);
}

.search-bar button:disabled {
  opacity: 0.35;
  cursor: default;
  transform: none;
}

.search-bar button .material-symbols-outlined {
  font-size: 20px;
}

.section-title {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  line-height: 16px;
  color: var(--color-outline);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 28px 0 12px;
}

/* ── Book Cards ──────────────────────────── */

.book-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  background: var(--color-surface-container-lowest);
  border: 1px solid var(--color-outline-variant);
  border-radius: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}

.book-card:hover {
  border-color: var(--color-primary-container);
  background: var(--color-surface-container-low);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
}

.book-card:active {
  background: var(--color-surface-container);
}

.book-card .info {
  flex: 1;
  min-width: 0;
}

.book-card .name {
  font-family: var(--font-ui);
  font-size: 15px;
  color: var(--color-on-surface);
  font-weight: 600;
  line-height: 1.4;
}

.book-card .author {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  line-height: 16px;
  color: var(--color-on-surface-variant);
  margin-top: 4px;
}

.book-card .arrow {
  color: var(--color-outline);
  font-size: 20px;
  font-weight: 300;
  opacity: 0.5;
  font-family: var(--font-ui);
}

.book-card .icon {
  font-size: 28px;
  line-height: 1;
  flex-shrink: 0;
}

/* ── Search Results ──────────────────────── */

.search-result {
  padding: 14px 16px;
  background: var(--color-surface-container-lowest);
  border: 1px solid var(--color-outline-variant);
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.2s ease, background 0.2s ease;
}

.search-result:hover {
  border-color: var(--color-primary-container);
  background: var(--color-surface-container-low);
}

.search-result .name {
  font-family: var(--font-ui);
  font-size: 15px;
  color: var(--color-on-surface);
  font-weight: 500;
}

.search-result .meta {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  line-height: 16px;
  color: var(--color-on-surface-variant);
  margin-top: 3px;
}

/* ── Reader Header ───────────────────────── */

.reader-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 12px;
  margin: 0 0 16px;
  border-bottom: 1px solid var(--color-outline-variant);
}

.reader-header .back-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 14px;
  border: 1.5px solid var(--color-outline-variant);
  border-radius: 10px;
  background: var(--color-surface-container-lowest);
  color: var(--color-on-surface);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  line-height: 20px;
  cursor: pointer;
  transition: border-color 0.2s ease, background 0.2s ease;
  flex-shrink: 0;
}

.reader-header .back-btn:hover {
  border-color: var(--color-primary-container);
  background: var(--color-surface-container-low);
}

.reader-header .back-btn .material-symbols-outlined {
  font-size: 18px;
}

.reader-header .ch-title {
  flex: 1;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  line-height: 20px;
  color: var(--color-on-surface-variant);
  text-align: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.reader-header .fs-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: 1.5px solid var(--color-primary-container);
  border-radius: 10px;
  background: var(--color-surface-container-lowest);
  color: var(--color-primary);
  cursor: pointer;
  transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  flex-shrink: 0;
}

.reader-header .fs-btn:hover {
  background: var(--color-primary);
  color: var(--color-on-primary);
  border-color: var(--color-primary);
}

.reader-header .fs-btn .material-symbols-outlined {
  font-size: 20px;
}

/* ── Chapter Navigation ──────────────────── */

.chapter-nav {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  padding: 0 12px;
}

.chapter-nav button {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 12px;
  border: 1.5px solid var(--color-outline-variant);
  border-radius: 10px;
  background: var(--color-surface-container-lowest);
  color: var(--color-on-surface);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  line-height: 20px;
  cursor: pointer;
  transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
}

.chapter-nav button:hover:not(:disabled) {
  border-color: var(--color-primary);
  color: var(--color-primary);
}

.chapter-nav button:disabled {
  opacity: 0.2;
  cursor: default;
}

.chapter-nav button .material-symbols-outlined {
  font-size: 18px;
}

.chapter-nav select {
  flex: 2;
  padding: 8px 12px;
  border: 1.5px solid var(--color-outline-variant);
  border-radius: 10px;
  background: var(--color-surface-container-lowest);
  color: var(--color-on-surface);
  font-family: var(--font-ui);
  font-size: 12px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s ease;
  min-width: 0;
}

.chapter-nav select:focus {
  border-color: var(--color-primary);
}

/* ── Reading Area (Warm Paper) ───────────── */

#reader {
  padding: 4px 4px;
}

.line {
  padding: 10px 4px;
  border-bottom: 1px solid rgba(194, 200, 192, 0.3);
}

.line-text {
  font-family: var(--font-body);
  font-size: 22px;
  line-height: 1.9;
  color: var(--color-on-surface);
  letter-spacing: 0.02em;
  font-weight: 400;
  padding: 0 4px;
}

/* ── Character / Pinyin ──────────────────── */

.char {
  display: inline-block;
  position: relative;
  cursor: pointer;
  border-radius: 4px;
  padding: 0 1px;
  transition: background 0.15s ease;
}

.char:active {
  background: var(--color-primary-fixed);
}

.non-zh {
  display: inline;
}

.char .py-overlay {
  display: none;
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 500;
  color: var(--color-primary);
  text-align: center;
  line-height: 1;
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  pointer-events: none;
  background: var(--color-primary-fixed);
  padding: 3px 8px;
  border-radius: 6px;
  z-index: 10;
}

.char .py-overlay.show {
  display: block;
}

.char.hl {
  background: var(--color-primary-fixed);
  border-radius: 4px;
}

/* ── Translation Lines ───────────────────── */

.line-trans {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--color-on-surface-variant);
  margin-top: 4px;
  padding: 6px 0 2px 14px;
  display: none;
  border-left: 3px solid var(--color-primary-fixed-dim);
}

.line-trans.show {
  display: block;
}

.line-trans.loading {
  display: block;
  color: var(--color-outline);
  font-style: italic;
}

/* ── Popup / Dictionary Card ─────────────── */

.popup {
  display: none;
  position: fixed;
  z-index: 100;
  background: var(--color-surface-container-lowest);
  border: 1px solid var(--color-outline-variant);
  border-radius: 12px;
  padding: 16px 20px;
  max-width: 320px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
  pointer-events: none;
}

.popup.show {
  display: block;
  animation: popupFadeIn 0.2s ease;
}

@keyframes popupFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.popup .p-word {
  font-family: var(--font-body);
  font-size: 24px;
  font-weight: 600;
  color: var(--color-on-surface);
}

.popup .p-py {
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 500;
  color: var(--color-primary);
  margin-left: 10px;
}

.popup .p-defs {
  margin-top: 10px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--color-on-surface);
}

.popup .p-defs li {
  list-style: none;
  padding: 3px 0;
  font-family: var(--font-ui);
  font-weight: 500;
  color: var(--color-on-surface);
}

.popup .p-defs li:before {
  content: '· ';
  color: var(--color-primary);
  font-weight: bold;
}

/* ── Loading & Status ────────────────────── */

.spin {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2.5px solid var(--color-outline-variant);
  border-top-color: var(--color-primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-box {
  text-align: center;
  padding: 60px 20px;
  color: var(--color-on-surface-variant);
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 500;
  line-height: 20px;
}

.status-text {
  text-align: center;
  padding: 60px 20px;
  color: var(--color-on-surface-variant);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.8;
  font-weight: 500;
}

/* ── Font Size Variants ──────────────────── */

.sz-20 .line-text { font-size: 20px; }
.sz-24 .line-text { font-size: 24px; }
.sz-28 .line-text { font-size: 28px; }

/* ── Responsive ──────────────────────────── */

@media (max-width: 600px) {
  .header {
    padding: 14px 0 12px;
  }

  .char .py-overlay {
    font-size: 10px;
    padding: 2px 6px;
  }

  .chapter-nav {
    flex-wrap: wrap;
  }

  .chapter-nav select {
    flex: 1 1 100%;
    order: -1;
  }

  .popup {
    max-width: 280px;
    padding: 14px 16px;
  }
}
</style>
</head>
<body>
<div class="container" id="appRoot">
  <div class="header">
    <h1>Muyu Reader</h1>
  </div>

  <!-- HOME VIEW -->
  <div id="homeView">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search novels..." autocomplete="off" autocorrect="off">
      <button id="searchBtn" onclick="doSearch()"><span class="material-symbols-outlined">search</span></button>
    </div>

    <div class="section-title">Featured Novels</div>
    <div class="book-card" onclick="openNovel('1012')">
      <div class="icon">📜</div>
      <div class="info">
        <div class="name">鬼吹灯（盗墓者的经历）</div>
        <div class="author">本物天下霸唱 · 240 chapters</div>
      </div>
      <div class="arrow">›</div>
    </div>

    <div id="searchResults"></div>
  </div>

  <!-- CHAPTER LIST VIEW -->
  <div id="chapterListView" style="display:none;">
    <div class="reader-header">
      <button class="back-btn" onclick="showHome()"><span class="material-symbols-outlined">arrow_back</span> Back</button>
      <div class="ch-title" id="novelTitle">Loading...</div>
    </div>
    <div id="chapterList"></div>
  </div>

  <!-- READING VIEW -->
  <div id="readingView" style="display:none;">
    <div class="reader-header">
      <button class="back-btn" onclick="showChapters()"><span class="material-symbols-outlined">arrow_back</span> Back</button>
      <div class="ch-title" id="chTitle">Chapter</div>
      <button class="fs-btn" onclick="cycleFontSize()"><span class="material-symbols-outlined">format_size</span></button>
    </div>
    <div class="chapter-nav">
      <button id="prevBtn" onclick="navChapter(-1)"><span class="material-symbols-outlined">chevron_left</span> Prev</button>
      <select id="chapterSelect" onchange="jumpToChapter()"></select>
      <button id="nextBtn" onclick="navChapter(1)">Next <span class="material-symbols-outlined">chevron_right</span></button>
    </div>
    <div id="reader"></div>
  </div>
</div>

<div class="popup" id="popup">
  <div><span class="p-word" id="pWord"></span><span class="p-py" id="pPy"></span></div>
  <ul class="p-defs" id="pDefs"></ul>
</div>

<script>
// --- State ---
let lines = [], transCache = {};
let novelId = null, chapterList = [], currentChIdx = -1;
let fontSize = 22;
let fontSizeClasses = ['sz-20', 'sz-24', 'sz-28'];
let fontSizeIndex = 0;
let popupTimer = null;

// --- Home ---
function showHome() {
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('chapterListView').style.display = 'none';
  document.getElementById('readingView').style.display = 'none';
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const results = document.getElementById('searchResults');
  results.innerHTML = '<div class="loading-box"><span class="spin"></span> Searching...</div>';

  fetch('/api/search?q=' + encodeURIComponent(q))
    .then(r => r.json())
    .then(data => {
      if (data.results?.length) {
        results.innerHTML = '<div class="section-title">Results</div>' +
          data.results.map(r => '<div class="search-result" onclick="openNovel(\'' + r.id + '\')">' +
            '<div class="name">' + h(r.name) + '</div>' +
            '</div>').join('');
      } else {
        results.innerHTML = '<div class="status-text">No results found</div>';
      }
    })
    .catch(() => { results.innerHTML = '<div class="status-text">Search failed</div>'; });
}

// Enter key to search
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

// --- Open novel ---
function openNovel(id) {
  novelId = id;
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('chapterListView').style.display = 'block';
  document.getElementById('novelTitle').textContent = 'Loading chapters...';

  fetch('/api/novel/' + id + '/chapters')
    .then(r => r.json())
    .then(data => {
      if (data.chapters?.length) {
        chapterList = data.chapters;
        document.getElementById('novelTitle').textContent = chapterList[0]?.title?.match(/第.*章/)?.[0] || '';
        renderChapterList();
      } else {
        document.getElementById('novelTitle').textContent = 'No chapters found';
      }
    })
    .catch(() => { document.getElementById('novelTitle').textContent = 'Error loading'; });
}

function renderChapterList() {
  const list = document.getElementById('chapterList');
  list.innerHTML = chapterList.map((ch, i) =>
    '<div class="book-card" onclick="readChapter(' + i + ')">' +
      '<div class="info"><div class="name">' + h(ch.title) + '</div></div>' +
      '<div class="arrow">›</div></div>'
  ).join('');
}

function showChapters() {
  document.getElementById('readingView').style.display = 'none';
  document.getElementById('chapterListView').style.display = 'block';
}

// --- Read chapter ---
function readChapter(idx) {
  const ch = chapterList[idx];
  if (!ch) return;
  currentChIdx = idx;
  document.getElementById('chapterListView').style.display = 'none';
  document.getElementById('readingView').style.display = 'block';
  document.getElementById('chTitle').textContent = ch.title;

  // Build chapter select
  const sel = document.getElementById('chapterSelect');
  sel.innerHTML = chapterList.map((c, i) =>
    '<option value="' + i + '" ' + (i === idx ? 'selected' : '') + '>' + h(c.title.substring(0, 22)) + '</option>'
  ).join('');
  document.getElementById('prevBtn').disabled = idx <= 0;
  document.getElementById('nextBtn').disabled = idx >= chapterList.length - 1;

  // Fetch chapter
  const reader = document.getElementById('reader');
  reader.innerHTML = '<div class="loading-box"><span class="spin"></span> Loading chapter...</div>';
  transCache = {};

  fetch('/api/fetch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: ch.url }) })
    .then(r => r.json())
    .then(data => {
      if (data.error) { reader.innerHTML = '<div class="status-text">' + data.error + '</div>'; return; }
      lines = data.lines;
      renderLines();
      translateAll();
    })
    .catch(() => { reader.innerHTML = '<div class="status-text">Error loading chapter</div>'; });
}

function renderLines() {
  const reader = document.getElementById('reader');
  document.getElementById('appRoot').className = fontSizeClasses[fontSizeIndex];
  reader.innerHTML = lines.map((line, i) => {
    let charHtml = '';
    for (const c of line.text) {
      if (/[\u4e00-\u9fff]/.test(c)) {
        charHtml += '<span class="char" data-l="' + i + '" data-p="" data-c="' + h(c) + '" onclick="onCharClick(event, this)">' +
          '<span class="py-overlay"></span>' + h(c) + '</span>';
      } else {
        charHtml += '<span class="non-zh">' + h(c) + '</span>';
      }
    }
    return '<div class="line"><div class="line-text">' + charHtml + '</div>' +
      '<div class="line-trans" id="t' + i + '"></div></div>';
  }).join('');
}

function onCharClick(event, el) {
  event.stopPropagation();
  const text = lines[parseInt(el.dataset.l)]?.text || '';
  const char = el.dataset.c;
  const pos = text.indexOf(char);

  // Show pinyin overlay
  document.querySelectorAll('.py-overlay').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('.char').forEach(e => e.classList.remove('hl'));
  const pyEl = el.querySelector('.py-overlay');
  el.classList.add('hl');

  // Look up in dictionary
  const segment = text.substring(Math.max(0, pos), Math.min(pos + 4, text.length));
  fetch('/api/dict/' + encodeURIComponent(segment))
    .then(r => r.json())
    .then(data => {
      if (data.pinyin) pyEl.textContent = data.pinyin;
      pyEl.classList.add('show');

      document.getElementById('pWord').textContent = data.word || char;
      document.getElementById('pPy').textContent = data.pinyin || '';
      const defsEl = document.getElementById('pDefs');
      defsEl.innerHTML = '';
      if (data.definitions?.length) {
        data.definitions.slice(0, 4).forEach(d => {
          const li = document.createElement('li');
          li.textContent = d;
          defsEl.appendChild(li);
        });
      } else {
        defsEl.innerHTML = '<li style="color:#B5A898">(no definition)</li>';
      }
    });

  // Position popup
  const popup = document.getElementById('popup');
  const rect = el.getBoundingClientRect();
  popup.style.left = Math.min(rect.left, window.innerWidth - 340) + 'px';
  popup.style.top = (rect.bottom + 10) + 'px';
  popup.classList.add('show');

  clearTimeout(popupTimer);
  popupTimer = setTimeout(hidePopup, 5000);
}

function hidePopup() {
  document.getElementById('popup').classList.remove('show');
  document.querySelectorAll('.py-overlay').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('.char').forEach(e => e.classList.remove('hl'));
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.popup') && !e.target.closest('.char')) hidePopup();
});

function navChapter(dir) {
  readChapter(currentChIdx + dir);
}

function jumpToChapter() {
  readChapter(parseInt(document.getElementById('chapterSelect').value));
}

function cycleFontSize() {
  fontSizeIndex = (fontSizeIndex + 1) % fontSizeClasses.length;
  document.getElementById('appRoot').className = fontSizeClasses[fontSizeIndex];
}

// --- Translation ---
function translateAll() {
  if (!lines.length) return;
  const texts = lines.map(l => l.text), uncached = [], uncachedIdx = [];
  texts.forEach((t, i) => {
    if (transCache[t]) {
      const el = document.getElementById('t' + i);
      if (el) { el.textContent = transCache[t]; el.classList.add('show'); }
    } else { uncached.push(t); uncachedIdx.push(i); }
  });
  if (!uncached.length) return;
  uncachedIdx.forEach(i => {
    const el = document.getElementById('t' + i);
    if (el) { el.textContent = '...'; el.classList.add('show', 'loading'); }
  });
  let bi = 0;
  const bs = 10;
  function tb() {
    const batch = uncached.slice(bi * bs, (bi + 1) * bs);
    if (!batch.length) return;
    fetch('/api/translate-batch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lines: batch }) })
    .then(r => r.json())
    .then(data => {
      if (data.translations) {
        data.translations.forEach((tr, j) => {
          const gi = bi * bs + j, oi = uncachedIdx[gi];
          if (oi !== undefined) {
            const el = document.getElementById('t' + oi);
            transCache[texts[oi]] = tr;
            if (el) { el.textContent = tr; el.classList.remove('loading'); }
          }
        });
      }
      bi++;
      if (bi * bs < uncached.length) setTimeout(tb, 400);
    }).catch(() => { bi++; });
  }
  tb();
}

function h(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
