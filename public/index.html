<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aquarium Reader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding-bottom: 20px; }
.container { max-width: 800px; margin: 0 auto; padding: 12px; }
.header { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #2a2a3e; margin-bottom: 16px; }
.header h1 { font-size: 20px; color: #00d4aa; font-weight: 700; letter-spacing: 0.5px; }
.header .fish { font-size: 24px; }

/* Home Screen */
.search-bar { display: flex; gap: 6px; margin-bottom: 12px; }
.search-bar input { flex: 1; padding: 12px 14px; border: 1px solid #333; border-radius: 10px; background: #16213e; color: #e0e0e0; font-size: 15px; outline: none; }
.search-bar input:focus { border-color: #00d4aa; }
.search-bar button { padding: 12px 18px; background: #00d4aa; color: #1a1a2e; border: none; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; }
.search-bar button:disabled { opacity: 0.4; }

.section-title { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }

.book-card { display: flex; align-items: center; gap: 12px; padding: 14px; background: #16213e; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid #2a2a3e; }
.book-card:active { background: #1a2745; }
.book-card .info { flex: 1; }
.book-card .name { font-size: 16px; color: #f0f0f0; font-weight: 600; }
.book-card .author { font-size: 12px; color: #888; margin-top: 2px; }
.book-card .arrow { color: #555; font-size: 18px; }
.book-card .icon { font-size: 28px; }

.search-result { padding: 12px 14px; background: #16213e; border-radius: 8px; margin-bottom: 6px; cursor: pointer; border: 1px solid #2a2a3e; }
.search-result:active { background: #1a2745; }
.search-result .name { font-size: 15px; color: #f0f0f0; }
.search-result .meta { font-size: 12px; color: #888; margin-top: 2px; }

/* Reading View */
.reader-header { display: flex; align-items: center; gap: 8px; padding: 8px 0; margin-bottom: 8px; }
.reader-header .back-btn { padding: 6px 12px; border: 1px solid #333; border-radius: 6px; background: #16213e; color: #ccc; font-size: 13px; cursor: pointer; }
.reader-header .ch-title { flex: 1; font-size: 14px; color: #888; text-align: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.reader-header .fs-btn { padding: 4px 8px; border: 1px solid #333; border-radius: 6px; background: #16213e; color: #888; font-size: 13px; cursor: pointer; }

.chapter-nav { display: flex; gap: 6px; margin-bottom: 12px; }
.chapter-nav button { flex: 1; padding: 10px; border: 1px solid #2a2a3e; border-radius: 8px; background: #16213e; color: #ccc; font-size: 14px; cursor: pointer; text-align: center; }
.chapter-nav button:disabled { opacity: 0.2; cursor: default; }
.chapter-nav select { flex: 2; padding: 8px; border: 1px solid #333; border-radius: 8px; background: #16213e; color: #ccc; font-size: 12px; }

/* Lines */
.line { padding: 8px 0; border-bottom: 1px solid #222; }
.line-text { font-size: 22px; line-height: 1.9; color: #f0f0f0; letter-spacing: 0.3px; }
.char { display: inline-block; position: relative; cursor: pointer; border-radius: 2px; padding: 0 0px; }
.char:active { background: #0f3460; border-radius: 3px; }
.non-zh { display: inline; }
.char .py-overlay { display: none; font-size: 11px; color: #00d4aa; text-align: center; line-height: 1; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); white-space: nowrap; pointer-events: none; background: #1a1a2e; padding: 2px 4px; border-radius: 4px; z-index: 10; }
.char .py-overlay.show { display: block; }
.char.hl { background: #0f3460; border-radius: 3px; }

.line-trans { font-size: 14px; color: #888; margin-top: 2px; padding: 2px 0; line-height: 1.5; display: none; }
.line-trans.show { display: block; }
.line-trans.loading { display: block; color: #666; font-style: italic; }

/* Popup */
.popup { display: none; position: fixed; z-index: 100; background: #0d1b2a; border: 1px solid #1a5276; border-radius: 12px; padding: 14px 16px; max-width: 300px; box-shadow: 0 4px 24px rgba(0,0,0,0.6); pointer-events: none; }
.popup.show { display: block; }
.popup .p-word { font-size: 26px; color: #f0f0f0; }
.popup .p-py { font-size: 14px; color: #00d4aa; margin-left: 8px; }
.popup .p-defs { margin-top: 8px; font-size: 13px; color: #ccc; line-height: 1.5; }
.popup .p-defs li { list-style: none; padding: 1px 0; }
.popup .p-defs li:before { content: '· '; color: #00d4aa; }

/* Loading */
.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid #333; border-top-color: #00d4aa; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-box { text-align: center; padding: 40px; color: #888; font-size: 14px; }
.status-text { text-align: center; padding: 40px 0; color: #555; font-size: 14px; line-height: 1.8; }

/* Font sizes */
.sz-20 .line-text { font-size: 20px; }
.sz-24 .line-text { font-size: 24px; }
.sz-28 .line-text { font-size: 28px; }
</style>
</head>
<body>
<div class="container" id="appRoot">
  <div class="header">
    <span class="fish">🐠</span><h1>Aquarium</h1>
  </div>

  <!-- HOME VIEW -->
  <div id="homeView">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search novels..." autocomplete="off" autocorrect="off">
      <button id="searchBtn" onclick="doSearch()">Search</button>
    </div>

    <div class="section-title">Featured Novels</div>
    <div class="book-card" onclick="openNovel('1012')">
      <div class="icon">📜</div>
      <div class="info">
        <div class="name">鬼吹灯（盗墓者的经历）</div>
        <div class="author">本物天下霸唱 · 240 chapters</div>
      </div>
      <div class="arrow">›</div>
    </div>

    <div id="searchResults"></div>
  </div>

  <!-- CHAPTER LIST VIEW -->
  <div id="chapterListView" style="display:none;">
    <div class="reader-header">
      <button class="back-btn" onclick="showHome()">← Back</button>
      <div class="ch-title" id="novelTitle">Loading...</div>
    </div>
    <div id="chapterList"></div>
  </div>

  <!-- READING VIEW -->
  <div id="readingView" style="display:none;">
    <div class="reader-header">
      <button class="back-btn" onclick="showChapters()">← Back</button>
      <div class="ch-title" id="chTitle">Chapter</div>
      <button class="fs-btn" onclick="cycleFontSize()">A</button>
    </div>
    <div class="chapter-nav">
      <button id="prevBtn" onclick="navChapter(-1)">← Prev</button>
      <select id="chapterSelect" onchange="jumpToChapter()"></select>
      <button id="nextBtn" onclick="navChapter(1)">Next →</button>
    </div>
    <div id="reader"></div>
  </div>
</div>

<div class="popup" id="popup">
  <div><span class="p-word" id="pWord"></span><span class="p-py" id="pPy"></span></div>
  <ul class="p-defs" id="pDefs"></ul>
</div>

<script>
// --- State ---
let lines = [], transCache = {};
let novelId = null, chapterList = [], currentChIdx = -1;
let fontSize = 22;
let fontSizeClasses = ['sz-20', 'sz-24', 'sz-28'];
let fontSizeIndex = 0;
let popupTimer = null;

// --- Home ---
function showHome() {
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('chapterListView').style.display = 'none';
  document.getElementById('readingView').style.display = 'none';
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const results = document.getElementById('searchResults');
  results.innerHTML = '<div class="loading-box"><span class="spin"></span> Searching...</div>';

  fetch('/api/search?q=' + encodeURIComponent(q))
    .then(r => r.json())
    .then(data => {
      if (data.results?.length) {
        results.innerHTML = '<div class="section-title">Results</div>' +
          data.results.map(r => '<div class="search-result" onclick="openNovel(\'' + r.id + '\')">' +
            '<div class="name">' + h(r.name) + '</div>' +
            '</div>').join('');
      } else {
        results.innerHTML = '<div class="status-text">No results found</div>';
      }
    })
    .catch(() => { results.innerHTML = '<div class="status-text">Search failed</div>'; });
}

// Enter key to search
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

// --- Open novel ---
function openNovel(id) {
  novelId = id;
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('chapterListView').style.display = 'block';
  document.getElementById('novelTitle').textContent = 'Loading chapters...';

  fetch('/api/novel/' + id + '/chapters')
    .then(r => r.json())
    .then(data => {
      if (data.chapters?.length) {
        chapterList = data.chapters;
        document.getElementById('novelTitle').textContent = chapterList[0]?.title?.match(/第.*章/)?.[0] || '';
        renderChapterList();
      } else {
        document.getElementById('novelTitle').textContent = 'No chapters found';
      }
    })
    .catch(() => { document.getElementById('novelTitle').textContent = 'Error loading'; });
}

function renderChapterList() {
  const list = document.getElementById('chapterList');
  list.innerHTML = chapterList.map((ch, i) =>
    '<div class="book-card" onclick="readChapter(' + i + ')">' +
      '<div class="info"><div class="name">' + h(ch.title) + '</div></div>' +
      '<div class="arrow">›</div></div>'
  ).join('');
}

function showChapters() {
  document.getElementById('readingView').style.display = 'none';
  document.getElementById('chapterListView').style.display = 'block';
}

// --- Read chapter ---
function readChapter(idx) {
  const ch = chapterList[idx];
  if (!ch) return;
  currentChIdx = idx;
  document.getElementById('chapterListView').style.display = 'none';
  document.getElementById('readingView').style.display = 'block';
  document.getElementById('chTitle').textContent = ch.title;

  // Build chapter select
  const sel = document.getElementById('chapterSelect');
  sel.innerHTML = chapterList.map((c, i) =>
    '<option value="' + i + '" ' + (i === idx ? 'selected' : '') + '>' + h(c.title.substring(0, 22)) + '</option>'
  ).join('');
  document.getElementById('prevBtn').disabled = idx <= 0;
  document.getElementById('nextBtn').disabled = idx >= chapterList.length - 1;

  // Fetch chapter
  const reader = document.getElementById('reader');
  reader.innerHTML = '<div class="loading-box"><span class="spin"></span> Loading chapter...</div>';
  transCache = {};

  fetch('/api/fetch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: ch.url }) })
    .then(r => r.json())
    .then(data => {
      if (data.error) { reader.innerHTML = '<div class="status-text">' + data.error + '</div>'; return; }
      lines = data.lines;
      renderLines();
      translateAll();
    })
    .catch(() => { reader.innerHTML = '<div class="status-text">Error loading chapter</div>'; });
}

function renderLines() {
  const reader = document.getElementById('reader');
  document.getElementById('appRoot').className = fontSizeClasses[fontSizeIndex];
  reader.innerHTML = lines.map((line, i) => {
    let charHtml = '';
    for (const c of line.text) {
      if (/[\u4e00-\u9fff]/.test(c)) {
        charHtml += '<span class="char" data-l="' + i + '" data-p="" data-c="' + h(c) + '" onclick="onCharClick(event, this)">' +
          '<span class="py-overlay"></span>' + h(c) + '</span>';
      } else {
        charHtml += '<span class="non-zh">' + h(c) + '</span>';
      }
    }
    return '<div class="line"><div class="line-text">' + charHtml + '</div>' +
      '<div class="line-trans" id="t' + i + '"></div></div>';
  }).join('');
}

function onCharClick(event, el) {
  event.stopPropagation();
  const text = lines[parseInt(el.dataset.l)]?.text || '';
  const char = el.dataset.c;
  const pos = text.indexOf(char);

  // Show pinyin overlay
  document.querySelectorAll('.py-overlay').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('.char').forEach(e => e.classList.remove('hl'));
  const pyEl = el.querySelector('.py-overlay');
  el.classList.add('hl');

  // Look up in dictionary
  const segment = text.substring(Math.max(0, pos), Math.min(pos + 4, text.length));
  fetch('/api/dict/' + encodeURIComponent(segment))
    .then(r => r.json())
    .then(data => {
      if (data.pinyin) pyEl.textContent = data.pinyin;
      pyEl.classList.add('show');

      document.getElementById('pWord').textContent = data.word || char;
      document.getElementById('pPy').textContent = data.pinyin || '';
      const defsEl = document.getElementById('pDefs');
      defsEl.innerHTML = '';
      if (data.definitions?.length) {
        data.definitions.slice(0, 4).forEach(d => {
          const li = document.createElement('li');
          li.textContent = d;
          defsEl.appendChild(li);
        });
      } else {
        defsEl.innerHTML = '<li style="color:#666">(no definition)</li>';
      }
    });

  // Position popup
  const popup = document.getElementById('popup');
  const rect = el.getBoundingClientRect();
  popup.style.left = Math.min(rect.left, window.innerWidth - 320) + 'px';
  popup.style.top = (rect.bottom + 10) + 'px';
  popup.classList.add('show');

  clearTimeout(popupTimer);
  popupTimer = setTimeout(hidePopup, 5000);
}

function hidePopup() {
  document.getElementById('popup').classList.remove('show');
  document.querySelectorAll('.py-overlay').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('.char').forEach(e => e.classList.remove('hl'));
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.popup') && !e.target.closest('.char')) hidePopup();
});

function navChapter(dir) {
  readChapter(currentChIdx + dir);
}

function jumpToChapter() {
  readChapter(parseInt(document.getElementById('chapterSelect').value));
}

function cycleFontSize() {
  fontSizeIndex = (fontSizeIndex + 1) % fontSizeClasses.length;
  document.getElementById('appRoot').className = fontSizeClasses[fontSizeIndex];
}

// --- Translation ---
function translateAll() {
  if (!lines.length) return;
  const texts = lines.map(l => l.text), uncached = [], uncachedIdx = [];
  texts.forEach((t, i) => {
    if (transCache[t]) {
      const el = document.getElementById('t' + i);
      if (el) { el.textContent = transCache[t]; el.classList.add('show'); }
    } else { uncached.push(t); uncachedIdx.push(i); }
  });
  if (!uncached.length) return;
  uncachedIdx.forEach(i => {
    const el = document.getElementById('t' + i);
    if (el) { el.textContent = '...'; el.classList.add('show', 'loading'); }
  });
  let bi = 0;
  const bs = 10;
  function tb() {
    const batch = uncached.slice(bi * bs, (bi + 1) * bs);
    if (!batch.length) return;
    fetch('/api/translate-batch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lines: batch }) })
    .then(r => r.json())
    .then(data => {
      if (data.translations) {
        data.translations.forEach((tr, j) => {
          const gi = bi * bs + j, oi = uncachedIdx[gi];
          if (oi !== undefined) {
            const el = document.getElementById('t' + oi);
            transCache[texts[oi]] = tr;
            if (el) { el.textContent = tr; el.classList.remove('loading'); }
          }
        });
      }
      bi++;
      if (bi * bs < uncached.length) setTimeout(tb, 400);
    }).catch(() => { bi++; });
  }
  tb();
}

function h(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
