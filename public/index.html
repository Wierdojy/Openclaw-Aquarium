<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aquarium Reader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding-bottom: 40px; }
.container { max-width: 800px; margin: 0 auto; padding: 12px; }
.header { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 12px; }
.header h1 { font-size: 18px; color: #00d4aa; font-weight: 600; }
.header .sub { font-size: 11px; color: #666; margin-left: auto; }
.url-bar { display: flex; gap: 6px; margin-bottom: 12px; }
.url-bar input { flex: 1; padding: 10px 12px; border: 1px solid #444; border-radius: 8px; background: #16213e; color: #e0e0e0; font-size: 14px; outline: none; }
.url-bar input:focus { border-color: #00d4aa; }
.url-bar button { padding: 10px 16px; background: #00d4aa; color: #1a1a2e; border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap; }
.url-bar button:disabled { opacity: 0.4; }
.nav-bar { display: flex; gap: 6px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.nav-bar button { padding: 8px 14px; border: 1px solid #1a5276; border-radius: 6px; background: #0f3460; color: #ccc; font-size: 14px; cursor: pointer; }
.nav-bar button:disabled { opacity: 0.3; cursor: default; }
.nav-bar select { flex: 1; padding: 6px 8px; border: 1px solid #444; border-radius: 6px; background: #16213e; color: #ccc; font-size: 12px; min-width: 0; max-width: 180px; }
.controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.controls button { padding: 6px 12px; border: 1px solid #444; border-radius: 6px; background: #16213e; color: #999; font-size: 13px; cursor: pointer; }
.controls .spacer { flex: 1; }

.line { padding: 10px 0; border-bottom: 1px solid #222; position: relative; }
.line-text { font-size: 22px; line-height: 1.8; color: #f0f0f0; letter-spacing: 0.5px; }
.char { display: inline-block; position: relative; cursor: pointer; border-radius: 2px; padding: 0 1px; margin: 0 0px; }
.char:active { background: #0f3460; }
.char .pinyin-overlay { display: none; font-size: 11px; color: #00d4aa; text-align: center; line-height: 1.1; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); white-space: nowrap; pointer-events: none; background: #1a1a2e; padding: 1px 3px; border-radius: 3px; z-index: 5; }
.char .pinyin-overlay.show { display: block; }
.char.highlight { background: #0f3460; border-radius: 3px; }
.non-zh { display: inline; }

.line-trans { font-size: 14px; color: #888; margin-top: 3px; padding: 4px 0; line-height: 1.5; display: none; }
.line-trans.show { display: block; }
.line-trans.loading { display: block; color: #666; font-style: italic; }

/* Popup for character definition */
.popup { display: none; position: fixed; z-index: 100; background: #0d1b2a; border: 1px solid #1a5276; border-radius: 10px; padding: 14px 18px; max-width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); pointer-events: none; }
.popup.show { display: block; }
.popup .popup-char { font-size: 28px; color: #f0f0f0; display: inline; }
.popup .popup-pinyin { font-size: 16px; color: #00d4aa; display: inline; margin-left: 10px; }
.popup .popup-defs { margin-top: 8px; font-size: 14px; color: #ccc; line-height: 1.6; }
.popup .popup-defs li { list-style: none; padding: 2px 0; }
.popup .popup-defs li:before { content: '· '; color: #00d4aa; }

.status { text-align: center; padding: 40px 0; color: #555; font-size: 14px; line-height: 1.8; }
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid #444; border-top-color: #00d4aa; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🐠 Aquarium</h1>
    <div class="sub">zhuishu.com</div>
  </div>
  <div class="url-bar">
    <input type="url" id="urlInput" placeholder="Paste chapter URL..." autocomplete="off" autocorrect="off">
    <button id="fetchBtn" onclick="fetchChapter()">Load</button>
  </div>
  <div class="nav-bar" id="navBar" style="display:none;">
    <button id="prevBtn" onclick="navChapter(-1)">←</button>
    <select id="chapterSelect" onchange="jumpToChapter()"></select>
    <button id="nextBtn" onclick="navChapter(1)">→</button>
  </div>
  <div class="controls">
    <button onclick="clearReader()">Clear</button>
  </div>

  <!-- Definition popup -->
  <div class="popup" id="popup">
    <div><span class="popup-char" id="popupChar"></span><span class="popup-pinyin" id="popupPinyin"></span></div>
    <ul class="popup-defs" id="popupDefs"></ul>
  </div>

  <div id="reader">
    <div class="status">Paste a chapter URL from zhuishu.com<br>to read with pinyin + translation</div>
  </div>
</div>
<script>
let lines = [], transCache = {};
let novelId = null, chapterList = [], currentChIdx = -1;
let popupTimer = null;

function fetchChapter(url) {
  const u = url || document.getElementById('urlInput').value.trim();
  if (!u) return;
  const reader = document.getElementById('reader');
  reader.innerHTML = '<div class="status"><span class="spin"></span>Loading...</div>';
  document.getElementById('fetchBtn').disabled = true;

  fetch('/api/fetch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: u }) })
  .then(r => r.json())
  .then(data => {
    document.getElementById('fetchBtn').disabled = false;
    if (data.error) { reader.innerHTML = '<div class="status" style="color:#ff6b6b">' + data.error + '</div>'; return; }
    lines = data.lines; transCache = {};
    render();
    translateAll();
    if (data.novelId && data.novelId !== novelId) {
      novelId = data.novelId;
      fetchChapterList(novelId, data.chapterId);
    } else if (data.novelId && data.chapterId) {
      updateNavState(data.chapterId);
    }
  })
  .catch(err => {
    document.getElementById('fetchBtn').disabled = false;
    reader.innerHTML = '<div class="status" style="color:#ff6b6b">Error: ' + err.message + '</div>';
  });
}

function render() {
  const reader = document.getElementById('reader');
  reader.innerHTML = lines.map((line, i) => {
    const text = h(line.text);
    // Build character-by-character HTML
    let charHtml = '';
    const chars = line.text.split('');
    for (let j = 0; j < chars.length; j++) {
      const c = chars[j];
      if (/[\u4e00-\u9fff]/.test(c)) {
        charHtml += '<span class="char" data-line="' + i + '" data-pos="' + j + '" data-char="' + h(c) + '" onclick="onCharClick(event, this)">' +
          '<span class="pinyin-overlay" id="py-' + i + '-' + j + '"></span>' +
          h(c) + '</span>';
      } else {
        charHtml += '<span class="non-zh">' + h(c) + '</span>';
      }
    }
    return '<div class="line" id="line-' + i + '">' +
      '<div class="line-text">' + charHtml + '</div>' +
      '<div class="line-trans" id="t' + i + '"></div></div>';
  }).join('');
}

function onCharClick(event, el) {
  event.stopPropagation();
  const lineIdx = parseInt(el.dataset.line);
  const pos = parseInt(el.dataset.pos);
  const char = el.dataset.char;
  const text = lines[lineIdx].text;

  // Show pinyin overlay on this character
  hideAllPinyin();
  const pyEl = document.getElementById('py-' + lineIdx + '-' + pos);
  if (pyEl) {
    // Fetch pinyin for this character
    fetch('/api/dict/' + encodeURIComponent(char))
      .then(r => r.json())
      .then(data => {
        if (data.pinyin) pyEl.textContent = data.pinyin;
        pyEl.classList.add('show');
        el.classList.add('highlight');
      });
  }

  // Show definition popup
  const popup = document.getElementById('popup');
  document.getElementById('popupChar').textContent = char;

  // Try to look up the word starting at this position
  const wordEnd = Math.min(pos + 4, text.length);
  const segment = text.substring(pos, wordEnd);

  fetch('/api/dict/' + encodeURIComponent(segment))
    .then(r => r.json())
    .then(data => {
      if (data.pinyin) document.getElementById('popupPinyin').textContent = data.pinyin;
      const defsEl = document.getElementById('popupDefs');
      defsEl.innerHTML = '';
      if (data.definitions && data.definitions.length) {
        data.definitions.slice(0, 4).forEach(d => {
          const li = document.createElement('li');
          li.textContent = d;
          defsEl.appendChild(li);
        });
      } else {
        defsEl.innerHTML = '<li style="color:#666">(no definition)</li>';
      }
    });

  // Position popup near the character
  const rect = el.getBoundingClientRect();
  popup.style.left = Math.min(rect.left, window.innerWidth - 340) + 'px';
  popup.style.top = (rect.bottom + 8) + 'px';
  popup.classList.add('show');

  // Hide popup after 3 seconds
  clearTimeout(popupTimer);
  popupTimer = setTimeout(() => {
    popup.classList.remove('show');
    hideAllPinyin();
  }, 4000);
}

function hideAllPinyin() {
  document.querySelectorAll('.pinyin-overlay').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.char').forEach(el => el.classList.remove('highlight'));
}

// Hide popup when tapping elsewhere
document.addEventListener('click', function(e) {
  if (!e.target.closest('.popup') && !e.target.closest('.char')) {
    document.getElementById('popup').classList.remove('show');
    hideAllPinyin();
  }
});

function translateAll() {
  if (!lines.length) return;
  const texts = lines.map(l => l.text), uncached = [], uncachedIdx = [];
  texts.forEach((t, i) => {
    if (transCache[t]) {
      const el = document.getElementById('t' + i);
      if (el) { el.textContent = transCache[t]; el.classList.add('show'); }
    } else { uncached.push(t); uncachedIdx.push(i); }
  });
  if (!uncached.length) return;
  uncachedIdx.forEach(i => {
    const el = document.getElementById('t' + i);
    if (el) { el.textContent = '...'; el.classList.add('show', 'loading'); }
  });
  let batchIndex = 0;
  const batchSize = 10;
  function translateBatch() {
    const batch = uncached.slice(batchIndex * batchSize, (batchIndex + 1) * batchSize);
    if (!batch.length) return;
    fetch('/api/translate-batch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lines: batch }) })
    .then(r => r.json())
    .then(data => {
      if (data.translations) {
        data.translations.forEach((trans, j) => {
          const gi = batchIndex * batchSize + j;
          const oi = uncachedIdx[gi];
          if (oi !== undefined) {
            const el = document.getElementById('t' + oi);
            transCache[texts[oi]] = trans;
            if (el) { el.textContent = trans; el.classList.remove('loading'); }
          }
        });
      }
      batchIndex++;
      if (batchIndex * batchSize < uncached.length) setTimeout(translateBatch, 500);
    }).catch(() => { batchIndex++; });
  }
  translateBatch();
}

function fetchChapterList(id, currentId) {
  fetch('/api/novel/' + id + '/chapters')
    .then(r => r.json())
    .then(data => {
      if (data.chapters && data.chapters.length) {
        chapterList = data.chapters;
        const sel = document.getElementById('chapterSelect');
        sel.innerHTML = chapterList.map((ch, i) =>
          '<option value="' + i + '">' + ch.title.substring(0, 24) + '</option>'
        ).join('');
        updateNavState(currentId);
        document.getElementById('navBar').style.display = 'flex';
      }
    }).catch(() => {});
}

function updateNavState(currentId) {
  currentChIdx = chapterList.findIndex(ch => ch.url.includes('/' + currentId + '.html'));
  if (currentChIdx >= 0) {
    document.getElementById('prevBtn').disabled = currentChIdx <= 0;
    document.getElementById('nextBtn').disabled = currentChIdx >= chapterList.length - 1;
    document.getElementById('chapterSelect').value = currentChIdx;
  }
}

function navChapter(dir) {
  const idx = currentChIdx + dir;
  if (idx < 0 || idx >= chapterList.length) return;
  document.getElementById('urlInput').value = chapterList[idx].url;
  fetchChapter(chapterList[idx].url);
}

function jumpToChapter() {
  const idx = parseInt(document.getElementById('chapterSelect').value);
  const ch = chapterList[idx];
  if (ch) { document.getElementById('urlInput').value = ch.url; fetchChapter(ch.url); }
}

function h(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function clearReader() {
  lines = []; transCache = {}; novelId = null; chapterList = []; currentChIdx = -1;
  document.getElementById('reader').innerHTML = '<div class="status">Paste a chapter URL from zhuishu.com<br>to read with pinyin + translation</div>';
  document.getElementById('urlInput').value = '';
  document.getElementById('navBar').style.display = 'none';
  document.getElementById('popup').classList.remove('show');
}
</script>
</body>
</html>
